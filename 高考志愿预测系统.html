// Main prediction
let predictionCache = null;

function startPredict() {
  try {
  const province = document.getElementById('province').value;
  const specialType = document.getElementById('specialType').value;
  const scoreErr = document.getElementById('scoreError');
  let score, cultureScore, specialExamScore;

  if (specialType) {
    // 特殊生：获取综合分
    cultureScore = parseInt(document.getElementById('cultureScore').value);
    specialExamScore = parseInt(document.getElementById('specialExamScore').value);
    score = parseInt(document.getElementById('score').value);
    if (isNaN(cultureScore)) {
      alert('请填写文化成绩');
      return;
    }
    // 体育生：从小项汇总获取专业分
    if (specialType === 'sports') {
      const prov = document.getElementById('province').value;
      const cfg = SPORTS_EXAM_CONFIG[prov] || SPORTS_EXAM_DEFAULT;
      updateSportsTotal();
      specialExamScore = parseInt(document.getElementById('specialExamScore').value);
      // 验证小项分数不超限
      const itemsError = document.getElementById('sportsItemsError');
      if (itemsError.classList.contains('show')) {
        alert('体育各小项分数有误，请检查后重新输入');
        return;
      }
    }
    if (isNaN(specialExamScore)) {
      alert(specialType === 'sports' ? '请填写体育各小项成绩' : '请填写专业成绩');
      return;
    }
    if (isNaN(score)) { calcCompositeScore(); score = parseInt(document.getElementById('score').value); }
  } else {
    score = parseInt(document.getElementById('score').value);
  }
  const subjects = document.getElementById('subjects').value;
  const year = parseInt(document.getElementById('year').value);

  // Validation
  scoreErr.classList.remove('show');
  if (!province) { alert('请选择省份'); return; }
  if (isNaN(score) || score < 0 || score > 750) { scoreErr.classList.add('show'); return; }
  if (!subjects) { alert('请选择选科组合'); return; }
  if (!year) { alert('请选择年份'); return; }

  const userSubjectList = subjects.split('+');
  // 特殊生已通过综合分体现优势，不再重复加分
  const specialBonus = specialType ? 0 : 0;
  const effectiveScore = score;

  const reach = [];
  const target = [];
  const safety = [];

  // 构建可用专业列表（普通专业+特殊专业）
  const majorPool = { ...getMajors() };
  let specialMajorNames = [];
  if (specialType && getSpecialMajors()[specialType]) {
    Object.entries(getSpecialMajors()[specialType]).forEach(([name, info]) => {
      majorPool[name] = info;
      specialMajorNames.push(name);
    });
  }

  getUniversities().forEach(u => {
    const schoolResults = [];
    const baseOffset = (specialType && hasSpecialType(u.id, specialType)) ? (SPECIAL_BASE_OFFSET[specialType] || 0) + getSpecialStrengthAdjust(u.id, specialType) : 0;
    const univBase = u.baseScore + baseOffset;

    // 普通生：只看普通专业；特殊生：普通专业+特殊专业（仅限该院校有此类别）
    let majorsToCheck = u.majors || [];
    if (specialType && hasSpecialType(u.id, specialType)) {
      majorsToCheck = [...new Set([...majorsToCheck, ...specialMajorNames])];
    }

    majorsToCheck.forEach(majorName => {
      const majorInfo = majorPool[majorName];
      if (!majorInfo) return;
      if (!subjectsMatch(majorInfo.requires, userSubjectList)) return;

      const predicted = calcPredictedScore(univBase, province, year, majorInfo.heat, u.city, u.tier);
      const diff = effectiveScore - predicted;

      schoolResults.push({
        major: majorName,
        category: majorInfo.category,
        predictedScore: predicted,
        diff: diff,
        heat: majorInfo.heat
      });
    });

    if (schoolResults.length === 0) return;

    schoolResults.sort((a, b) => b.predictedScore - a.predictedScore);

    const avgDiff = Math.round(schoolResults.reduce((s, m) => s + m.diff, 0) / schoolResults.length);
    const entry = {
      uni: u,
      majors: schoolResults,
      avgDiff: avgDiff,
      minDiff: Math.min(...schoolResults.map(m => m.diff)),
      maxDiff: Math.max(...schoolResults.map(m => m.diff)),
      univBase: univBase,
    };

    // 冲击: 分差在-55到5之间（有机会但需冲刺）
    // 稳妥: 分差在5到30之间（录取把握较大）
    // 保底: 分差大于30（稳录取）
    if (entry.minDiff < -55) return;
    if (entry.minDiff <= 5) reach.push(entry);
    else if (entry.minDiff <= 30) target.push(entry);
    else safety.push(entry);
  });

  // Sort: tier desc, then avgDiff (reach: most reachable first; target: best match first; safety: safest first)
  const sortFn = (a, b) => {
    const tierCmp = tierOrder(b.uni.tier) - tierOrder(a.uni.tier);
    if (tierCmp !== 0) return tierCmp;
    return b.avgDiff - a.avgDiff;
  };
  reach.sort(sortFn);
  target.sort(sortFn);
  safety.sort(sortFn);

  predictionCache = { province, score, subjects, year, reach, target, safety, userSubjectList, specialType, specialBonus, cultureScore, specialExamScore };

  // Render layer 2
  const specialLabelMap = { 'sports':'体育生','music':'音乐生','art':'美术生' };
  document.getElementById('rProvince').textContent = province;
  document.getElementById('rSubjects').textContent = subjects;
  document.getElementById('rYear').textContent = year + '年';
  if (specialType) {
    document.getElementById('rScore').textContent = score + ' 分 (' + specialLabelMap[specialType] + '综合分)';
  } else {
    document.getElementById('rScore').textContent = score + ' 分';
  }
  document.getElementById('reachCount').textContent = reach.length + ' 所';
  document.getElementById('targetCount').textContent = target.length + ' 所';
  document.getElementById('safetyCount').textContent = safety.length + ' 所';

  // Populate uni province filter
  populateUniProvinceFilter();

  // Show/hide special major filter
  const specialFilterEl = document.getElementById('specialMajorFilter');
  if (specialType) {
    specialFilterEl.style.display = 'flex';
    document.getElementById('specialMajorType').value = '';
  } else {
    specialFilterEl.style.display = 'none';
  }

  // Reset tabs & filters
  document.getElementById('uniProvinceFilter').value = '';
  document.getElementById('uniTierFilter').value = '';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  currentTab = 'reach';
  renderSchoolList('reach');
  showLayer('layer2');
  } catch(e) {
    console.error('预测出错:', e.message);
    alert('系统处理出错，请刷新页面后重试。错误信息：' + e.message);
  }
}

// ==================== FILTERS ====================
let currentTab = 'reach';

function populateUniProvinceFilter() {
  const sel = document.getElementById('uniProvinceFilter');
  sel.innerHTML = '<option value="">全部省份</option>';
  const provinces = [...new Set(getUniversities().map(u => getProvince(u.city)))].sort();
  provinces.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

function applyFilters() {
  renderSchoolList(currentTab);
}

// Render school list for a given category
function renderSchoolList(category) {
  try {
  if (!predictionCache) return;
  let list = predictionCache[category];

  // Apply province filter
  const provinceFilter = document.getElementById('uniProvinceFilter').value;
  if (provinceFilter) {
    list = list.filter(entry => getProvince(entry.uni.city) === provinceFilter);
  }

  // Apply tier filter
  const tierFilter = document.getElementById('uniTierFilter').value;
  if (tierFilter) {
    list = list.filter(entry => entry.uni.tier === tierFilter);
  }

  // Apply special major type filter
  let specialMajorNamesList = [];
  if (predictionCache.specialType && getSpecialMajors()[predictionCache.specialType]) {
    specialMajorNamesList = Object.keys(getSpecialMajors()[predictionCache.specialType]);
  }
  const specialMajorFilter = document.getElementById('specialMajorType');
  const specialMajorFilterVal = specialMajorFilter && specialMajorFilter.value;
  if (specialMajorFilterVal === 'regular') {
    list = list.map(entry => ({
      ...entry,
      majors: entry.majors.filter(m => !specialMajorNamesList.includes(m.major))
    })).filter(entry => entry.majors.length > 0);
  } else if (specialMajorFilterVal === 'special') {
    list = list.map(entry => ({
      ...entry,
      majors: entry.majors.filter(m => specialMajorNamesList.includes(m.major))
    })).filter(entry => entry.majors.length > 0);
  }

  const container = document.getElementById('schoolList');

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div>暂无匹配院校</div>`;
    return;
  }

  container.innerHTML = list.map((entry, idx) => {
    const u = entry.uni;
    const tierClass = `tier-${u.tier.replace(/\s/g, '-')}`;
    const tierLabel = { '985':'985','211':'211','double-first':'双一流','first':'一本','second':'二本','junior':'专科' }[u.tier] || u.tier;

    const majorTags = entry.majors.map(m => {
      const isSpecial = specialMajorNamesList.includes(m.major);
      const hotClass = m.heat >= 10 ? ' hot' : '';
      const specialClass = isSpecial ? ' special-major' : '';
      return `<span class="major-tag${hotClass}${specialClass}">${m.major}<span class="major-score">${m.predictedScore}</span></span>`;
    }).join('');

    return `
      <div class="school-card" onclick="showDetail('${u.id}', '${category}')">
        <div class="school-card-header">
          ${getSchoolBadgeHTML(u)}
          <div class="school-info">
            <div class="school-name">${u.name} <span class="tier-badge ${tierClass}">${tierLabel}</span></div>
            <div class="school-location">${getProvince(u.city)} · ${entry.majors.length}个匹配专业</div>
          </div>
          <div class="school-score">
            <span class="predicted">${Math.round(entry.majors.reduce((s,m) => s + m.predictedScore, 0) / entry.majors.length)}</span>
            <span class="label">预测均分</span>
          </div>
        </div>
        <div class="major-tags">${majorTags}</div>
      </div>`;
  }).join('');
  } catch(e) {
    console.error('渲染列表出错:', e.message);
    container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载出错，请重试</div>';
  }
}

// Switch tabs
function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent.includes(cat === 'reach' ? '冲击' : cat === 'target' ? '稳妥' : '保底'));
  });
  renderSchoolList(cat);
}

// Back to input
function backToInput() { predictionCache = null; showLayer('layer1'); }

  const majorsData = getMajors();

  const avgScores = trendYears.map(y => {
    return Math.round(entry.majors.reduce((s, m) => {
      return s + calcPredictedScore(entry.univBase, province, parseInt(y), majorsData[m.major]?.heat || 0, uni.city, uni.tier);
    }, 0) / entry.majors.length);

// ==================== DATA MANAGEMENT ====================
const STORAGE_KEY = 'gk_universities_data';
const STORAGE_MAJORS_KEY = 'gk_majors_data';
const STORAGE_SPECIAL_MAJORS_KEY = 'gk_special_majors_data';

// 动态数据（从localStorage加载或使用默认值）
let dynamicUniversities = null;
let dynamicMajors = null;
let dynamicSpecialMajors = null;

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { dynamicUniversities = JSON.parse(saved); }
  } catch(e) { console.warn('加载院校数据失败:', e); }
  if (!dynamicUniversities) { dynamicUniversities = JSON.parse(JSON.stringify(UNIVERSITIES)); }

  try {
    const savedM = localStorage.getItem(STORAGE_MAJORS_KEY);
    if (savedM) { dynamicMajors = JSON.parse(savedM); }
  } catch(e) {}
  if (!dynamicMajors) { dynamicMajors = JSON.parse(JSON.stringify(MAJORS)); }

  try {
    const savedSM = localStorage.getItem(STORAGE_SPECIAL_MAJORS_KEY);
    if (savedSM) { dynamicSpecialMajors = JSON.parse(savedSM); }
  } catch(e) {}
  if (!dynamicSpecialMajors) { dynamicSpecialMajors = JSON.parse(JSON.stringify(SPECIAL_MAJORS)); }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dynamicUniversities));
    localStorage.setItem(STORAGE_MAJORS_KEY, JSON.stringify(dynamicMajors));
    localStorage.setItem(STORAGE_SPECIAL_MAJORS_KEY, JSON.stringify(dynamicSpecialMajors));
    return true;
  } catch(e) { showToast('保存失败：' + e.message); return false; }
}

function getUniversities() { return dynamicUniversities || UNIVERSITIES; }
function getMajors() { return dynamicMajors || MAJORS; }
function getSpecialMajors() { return dynamicSpecialMajors || SPECIAL_MAJORS; }

// Admin panel
let adminOpen = false;
function toggleAdminPanel() {
  adminOpen = !adminOpen;
  document.getElementById('adminPanel').classList.toggle('show', adminOpen);
  document.getElementById('adminToggleBtn').textContent = adminOpen ? '收起管理' : '数据管理';
  if (adminOpen) renderAdminTable();
}

function renderAdminTable() {
  const univs = getUniversities();
  const search = (document.getElementById('adminSearch')?.value || '').toLowerCase();
  let filtered = univs;
  if (search) {
    filtered = univs.filter(u => u.name.toLowerCase().includes(search) || getProvince(u.city).toLowerCase().includes(search) || u.id.toLowerCase().includes(search));
  }
  document.getElementById('adminCount').textContent = univs.length;
  const modifiedBadge = document.getElementById('adminModifiedBadge');
  if (dynamicUniversities !== null) {
    modifiedBadge.style.display = 'inline';
  } else {
    modifiedBadge.style.display = 'none';
  }

  const tbody = document.getElementById('adminTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#ccc;padding:30px;">无匹配院校</td></tr>';
    return;
  }

  const tierLabel = { '985':'985','211':'211','double-first':'双一流','first':'一本','second':'二本','junior':'专科' };
  tbody.innerHTML = filtered.map(u => {
    return '<tr>' +
      '<td style="color:#aaa;font-size:11px;">' + u.id + '</td>' +
      '<td><strong>' + u.name + '</strong></td>' +
      '<td>' + getProvince(u.city) + '</td>' +
      '<td>' + (tierLabel[u.tier] || u.tier) + '</td>' +
      '<td>' + u.baseScore + '</td>' +
      '<td>' + (u.majors ? u.majors.length : 0) + '</td>' +
      '<td class="actions">' +
        '<button class="edit" onclick="openEditModal(\'' + u.id + '\')">编辑</button>' +
        '<button class="del" onclick="deleteUniv(\'' + u.id + '\')">删除</button>' +
      '</td>' +
      '</tr>';
  }).join('');

function findUnivIndex(id) {
  return getUniversities().findIndex(u => u.id === id);
}

function deleteUniv(id) {
  const u = getUniversities()[findUnivIndex(id)];
  if (!u) return;
  if (!confirm('确定要删除「' + u.name + '」吗？此操作不可恢复。')) return;
  dynamicUniversities = getUniversities().filter(u => u.id !== id);
  saveData();
  renderAdminTable();
  showToast('已删除：' + u.name);
}

function resetData() {
  if (!confirm('确定要恢复为系统默认数据吗？所有修改将丢失！')) return;
  dynamicUniversities = null;
  dynamicMajors = null;
  dynamicSpecialMajors = null;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_MAJORS_KEY);
  localStorage.removeItem(STORAGE_SPECIAL_MAJORS_KEY);
  renderAdminTable();
  showToast('已恢复默认数据');
}

function buildModalForm(univ, isNew) {
  const allMajors = Object.keys(getMajors());

    return '<label style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;margin-bottom:6px;font-size:12px;cursor:pointer;"><input type="checkbox" value="' + m + '"' + checked + '> ' + m + '</label>';
  }).join('');

  // 特长专业
  const allSpecial = {};
  Object.entries(getSpecialMajors()).forEach(([type, majors]) => {
    Object.keys(majors).forEach(m => { allSpecial[m] = type; });
  });

  const idField = isNew ? '<div class="field"><label>院校ID <span style="color:#e85555">*必填</span></label><input id="mId" value="' + univ.id + '" placeholder="英文标识，如 pku"></div>' : '<div class="field"><label>院校ID</label><input id="mId" value="' + univ.id + '" readonly style="background:#f5f5f5;color:#999;"></div>';

    '</select></div>' +

    '<div class="form-row"><div class="field"><label>Emoji图标</label><input id="mEmoji" value="' + (univ.emoji || '🏫') + '"></div></div>' +

    '<div class="btn-row" style="margin-top:16px;">' +
    '<button class="btn btn-back" onclick="closeModal()">取消</button>' +
    '<button class="btn btn-primary" style="width:auto;" onclick="saveUniv(\'' + (isNew ? 'new' : univ.id) + '\')">保存</button></div>';
}

function saveUniv(originalId) {
  const isNew = originalId === 'new';
  const id = document.getElementById('mId').value.trim();
  const name = document.getElementById('mName').value.trim();
  const city = document.getElementById('mCity').value.trim();
  const tier = document.getElementById('mTier').value;
  const baseScore = parseInt(document.getElementById('mBaseScore').value) || 0;
  const emoji = document.getElementById('mEmoji').value.trim() || '🏫';
  const desc = document.getElementById('mDesc').value.trim();
  const advantages = document.getElementById('mAdvantages').value.split('\n').map(s => s.trim()).filter(Boolean);

  // 收集选中的专业
  const majorChecks = document.querySelectorAll('#adminModal input[type="checkbox"]:checked');
  const majors = Array.from(majorChecks).map(cb => cb.value);

  if (!id) { alert('请输入院校ID'); return; }
  if (!name) { alert('请输入院校名称'); return; }
  if (!city) { alert('请输入所在城市'); return; }

  const univs = getUniversities();
  if (isNew) {
    if (univs.find(u => u.id === id)) { alert('院校ID「' + id + '」已存在，请更换'); return; }
    dynamicUniversities = [...univs, { id, name, emoji, city, tier, baseScore, majors, advantages, desc }];
    showToast('已新增：' + name);
  } else {
    const idx = findUnivIndex(originalId);
    if (idx < 0) return;
    dynamicUniversities = [...univs];
    if (originalId !== id) {
      if (univs.find(u => u.id === id)) { alert('新ID「' + id + '」已存在，请更换'); return; }
    }
    dynamicUniversities[idx] = { ...dynamicUniversities[idx], id, name, emoji, city, tier, baseScore, majors, advantages, desc };
    showToast('已更新：' + name);
  }

  saveData();
  closeModal();
  renderAdminTable();
}

// Export / Import
function exportData() {
  const data = {
    universities: getUniversities(),
    majors: getMajors(),
    specialMajors: getSpecialMajors(),
    exportTime: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '高考志愿数据库_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importDataPrompt() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.universities || !Array.isArray(data.universities)) { throw new Error('数据格式不正确'); }
        if (!confirm('即将导入 ' + data.universities.length + ' 所院校数据，当前数据将被覆盖。确认继续？')) return;
        dynamicUniversities = data.universities;
        if (data.majors) dynamicMajors = data.majors;
        if (data.specialMajors) dynamicSpecialMajors = data.specialMajors;
        saveData();
        renderAdminTable();
        showToast('已导入 ' + data.universities.length + ' 所院校');
      } catch(err) {
        showToast('导入失败：' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

<!-- ========== 人物Canvas动画引擎 (背景抠除 + 流光炫彩粒子) ========== -->
<script>
(function() {
  const leftCanvas = document.getElementById('charCanvasLeft');
  const rightCanvas = document.getElementById('charCanvasRight');
  if (!leftCanvas || !rightCanvas) return;

  function resizeCanvases() {
    [leftCanvas, rightCanvas].forEach(c => {
      c.width = c.offsetWidth || 280;
      c.height = window.innerHeight;
    });
  }
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  const leftCtx = leftCanvas.getContext('2d');
  const rightCtx = rightCanvas.getContext('2d');

  // 加载人物图片
  const charImg = new Image();
  charImg.src = 'image1/character1.png';

  // 预处理后的透明背景人物 (offscreen canvas缓存)
  let processedLeft = null;
  let processedRight = null;
  let bgColor = null; // 检测到的背景色

  // 背景色抠除：沿边缘密集采样，精确检测并移除背景色
  function removeBackground(sourceImg, sx, sy, sw, sh) {
    const oc = document.createElement('canvas');
    oc.width = sw;
    oc.height = sh;
    const octx = oc.getContext('2d');
    octx.drawImage(sourceImg, sx, sy, sw, sh, 0, 0, sw, sh);
    const imgData = octx.getImageData(0, 0, sw, sh);
    const data = imgData.data;

    // 沿四边密集采样背景色（每隔5px采一个点）
    const samples = [];
    const step = 5;
    for (let x = 0; x < sw; x += step) { samples.push([x, 0]); samples.push([x, sh-1]); }
    for (let y = step; y < sh - step; y += step) { samples.push([0, y]); samples.push([sw-1, y]); }

    // 收集所有采样颜色
    const colors = [];
    samples.forEach(([x, y]) => {
      const i = (y * sw + x) * 4;
      colors.push({ r: data[i], g: data[i+1], b: data[i+2] });
    });

    // 计算颜色中位数（比均值更抗噪）
    colors.sort((a, b) => (a.r + a.g + a.b) - (b.r + b.g + b.b));
    const mid = Math.floor(colors.length / 2);
    const bgR = colors[mid].r;
    const bgG = colors[mid].g;
    const bgB = colors[mid].b;

    // 计算颜色标准差以确定自适应容差
    let varR = 0, varG = 0, varB = 0;
    colors.forEach(c => {
      varR += (c.r - bgR) ** 2; varG += (c.g - bgG) ** 2; varB += (c.b - bgB) ** 2;
    });
    varR = Math.sqrt(varR / colors.length);
    varG = Math.sqrt(varG / colors.length);
    varB = Math.sqrt(varB / colors.length);
    const avgVar = (varR + varG + varB) / 3;
    const tolerance = Math.max(35, Math.min(80, avgVar * 2.5 + 30));

    // 保存背景色供后续使用
    if (!bgColor) bgColor = { r: bgR, g: bgG, b: bgB };

    // 逐像素处理
    for (let i = 0; i < data.length; i += 4) {
      const dr = data[i] - bgR;
      const dg = data[i+1] - bgG;
      const db = data[i+2] - bgB;
      // 使用加权欧氏距离（人眼对绿色更敏感）
      const dist = Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db) / 3;
      if (dist < tolerance) {
        data[i+3] = Math.round(Math.pow(dist / tolerance, 1.5) * 255);
      }
    }
    octx.putImageData(imgData, 0, 0);
    return oc;
  }

  charImg.onload = function() {
    const charW = charImg.width / 2;
    const charH = charImg.height;
    processedLeft = removeBackground(charImg, 0, 0, charW, charH);
    processedRight = removeBackground(charImg, charW, 0, charW, charH);
  };

  // ========== 流光炫彩粒子系统 ==========
  const particlesL = [];
  const particlesR = [];
  const MAX_PARTICLES = 130;

  // 仙域配色 - 流光溢彩
  const CELESTIAL_HUES = [
    { h: 40, s: 90, l: 72 },  // 流光金
    { h: 50, s: 95, l: 78 },  // 炽金
    { h: 195, s: 75, l: 72 }, // 青冥
    { h: 210, s: 80, l: 78 }, // 天蓝
    { h: 285, s: 65, l: 76 }, // 紫炁
    { h: 305, s: 75, l: 80 }, // 紫霞
    { h: 335, s: 65, l: 74 }, // 粉霞
    { h: 165, s: 70, l: 70 }, // 翠玉
    { h: 18, s: 80, l: 68 },  // 朱砂
    { h: 55, s: 90, l: 82 },  // 明金
    { h: 215, s: 80, l: 84 }, // 冰蓝
    { h: 345, s: 85, l: 80 }, // 樱粉
    { h: 185, s: 65, l: 68 }, // 青碧
    { h: 25, s: 85, l: 78 },  // 赤金
    { h: 265, s: 55, l: 78 }, // 星紫
    { h: 90, s: 55, l: 72 },  // 玉绿
  ];

  function createParticle(canvas) {
    const hueDef = CELESTIAL_HUES[Math.floor(Math.random() * CELESTIAL_HUES.length)];
    const type = Math.random();
    let size, speed, maxLife, trailLen;
    if (type < 0.12) {
      // 大型流光粒子
      size = Math.random() * 6 + 3;
      speed = Math.random() * 0.3 + 0.08;
      maxLife = Math.random() * 550 + 350;
      trailLen = Math.floor(Math.random() * 8) + 4;
    } else if (type < 0.30) {
      // 星点闪烁
      size = Math.random() * 2.2 + 0.5;
      speed = Math.random() * 0.9 + 0.35;
      maxLife = Math.random() * 220 + 100;
      trailLen = Math.floor(Math.random() * 3) + 1;
    } else if (type < 0.48) {
      // 螺旋粒子
      size = Math.random() * 3.5 + 1.2;
      speed = Math.random() * 0.4 + 0.12;
      maxLife = Math.random() * 450 + 250;
      trailLen = Math.floor(Math.random() * 6) + 3;
    } else {
      // 标准灵气
      size = Math.random() * 3.2 + 0.8;
      speed = Math.random() * 0.55 + 0.15;
      maxLife = Math.random() * 400 + 180;
      trailLen = Math.floor(Math.random() * 5) + 2;
    }
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 10,
      size: size,
      speed: speed,
      opacity: Math.random() * 0.75 + 0.2,
      hue: hueDef.h,
      sat: hueDef.s,
      light: hueDef.l,
      wobble: Math.random() * 3 - 1.5,
      wobbleSpeed: Math.random() * 0.035 + 0.012,
      spiralAmp: Math.random() * 25 + 5,
      spiralFreq: Math.random() * 0.015 + 0.005,
      life: 0,
      maxLife: maxLife,
      trail: [],
      trailLen: trailLen
    };
  }

  // 初始化粒子
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particlesL.push(createParticle(leftCanvas));
    particlesR.push(createParticle(rightCanvas));
    particlesL[i].y = Math.random() * leftCanvas.height;
    particlesR[i].y = Math.random() * rightCanvas.height;
  }

  let time = 0;

  function drawCharacter(ctx, canvas, particles, side, timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const breathe = Math.sin(timestamp * 0.001) * 4;
    const floatY = Math.sin(timestamp * 0.0007 + (side === 'right' ? Math.PI : 0)) * 6;

    // 绘制预处理后的人物（透明背景）
    const processed = side === 'left' ? processedLeft : processedRight;
    if (processed) {
      ctx.save();
      const drawHeight = canvas.height * 0.78;
      const drawWidth = (processed.width / processed.height) * drawHeight;
      const dx = (canvas.width - drawWidth) / 2;
      const dy = (canvas.height - drawHeight) / 2 + breathe + floatY;

      // 外发光
      ctx.shadowColor = side === 'left'
        ? 'rgba(120,210,255,0.4)'
        : 'rgba(255,170,220,0.4)';
      ctx.shadowBlur = 30 + Math.sin(timestamp * 0.002) * 10;
      ctx.globalAlpha = 0.92 + Math.sin(timestamp * 0.0015) * 0.04;
      ctx.drawImage(processed, dx, dy, drawWidth, drawHeight);

      // 底部渐变淡出
      const gradient = ctx.createLinearGradient(0, canvas.height * 0.85, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(6,4,10,0)');
      gradient.addColorStop(0.5, 'rgba(6,4,10,0.55)');
      gradient.addColorStop(1, 'rgba(6,4,10,0.95)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, canvas.height * 0.85, canvas.width, canvas.height * 0.15);

      // 内边缘柔光过渡
      const innerFade = ctx.createLinearGradient(
        side === 'left' ? canvas.width * 0.72 : 0, 0,
        side === 'left' ? canvas.width : canvas.width * 0.28, 0
      );
      innerFade.addColorStop(0, 'rgba(6,4,10,0)');
      innerFade.addColorStop(1, 'rgba(6,4,10,0.55)');
      ctx.fillStyle = innerFade;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.restore();
    } else if (charImg.complete && charImg.naturalWidth > 0) {
      // Fallback: 预处理未完成时使用screen混合模式自然融合深色背景
      ctx.save();
      const charWidth = charImg.width / 2;
      const charHeight = charImg.height;
      const drawHeight = canvas.height * 0.78;
      const drawWidth = (charWidth / charHeight) * drawHeight;
      const sx = side === 'left' ? 0 : charWidth;
      const dx = (canvas.width - drawWidth) / 2;
      const dy = (canvas.height - drawHeight) / 2 + breathe + floatY;

      ctx.shadowColor = side === 'left'
        ? 'rgba(100,200,255,0.5)'
        : 'rgba(255,160,210,0.5)';
      ctx.shadowBlur = 35 + Math.sin(timestamp * 0.0018) * 10;
      ctx.globalAlpha = 0.88;
      ctx.drawImage(charImg, sx, 0, charWidth, charHeight, dx, dy, drawWidth, drawHeight);

      // 更强的底部渐变淡出
      const gradient = ctx.createLinearGradient(0, canvas.height * 0.82, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(6,4,10,0)');
      gradient.addColorStop(0.4, 'rgba(6,4,10,0.5)');
      gradient.addColorStop(1, 'rgba(6,4,10,0.98)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, canvas.height * 0.82, canvas.width, canvas.height * 0.18);

      // 边缘柔光
      const innerFade = ctx.createLinearGradient(
        side === 'left' ? canvas.width * 0.7 : 0, 0,
        side === 'left' ? canvas.width : canvas.width * 0.3, 0
      );
      innerFade.addColorStop(0, 'rgba(6,4,10,0)');
      innerFade.addColorStop(1, 'rgba(6,4,10,0.55)');
      ctx.fillStyle = innerFade;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    // ========== 绘制流光炫彩粒子 ==========
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.life++;
      p.y -= p.speed;
      // 正弦+螺旋复合运动
      p.x += Math.sin(p.life * p.wobbleSpeed + p.wobble) * 0.5
           + Math.cos(p.life * p.spiralFreq) * 0.3;

      // 更新拖尾轨迹
      p.trail.push({ x: p.x, y: p.y, life: p.life });
      if (p.trail.length > p.trailLen) p.trail.shift();

      if (p.life > p.maxLife || p.y < -30) {
        Object.assign(p, createParticle(canvas));
        p.y = canvas.height + 10;
        p.life = 0;
        p.trail = [];
      }

      const lifeRatio = 1 - (p.life / p.maxLife);
      const alpha = lifeRatio < 0.12
        ? (lifeRatio / 0.12) * p.opacity
        : lifeRatio > 0.65
          ? ((1 - lifeRatio) / 0.35) * p.opacity
          : p.opacity;

      // 绘制拖尾
      if (p.trail.length > 1 && p.size > 1.5) {
        for (let t = 1; t < p.trail.length; t++) {
          const trailAlpha = alpha * (t / p.trail.length) * 0.35;
          const trailSize = p.size * (t / p.trail.length) * 0.7;
          ctx.beginPath();
          ctx.arc(p.trail[t].x, p.trail[t].y, trailSize, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${trailAlpha})`;
          ctx.fill();
        }
      }

      // 绘制粒子主体（径向渐变光晕）
      ctx.beginPath();
      const glowGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2.2);
      glowGrad.addColorStop(0, `hsla(${p.hue}, ${p.sat}%, ${Math.min(100, p.light + 15)}%, ${alpha})`);
      glowGrad.addColorStop(0.35, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${alpha * 0.7})`);
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
      ctx.fill();

      // 亮芯
      if (p.size > 1.5) {
        ctx.beginPath();
        const coreGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 0.6);
        coreGrad.addColorStop(0, `rgba(255,255,250,${alpha * 0.9})`);
        coreGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = coreGrad;
        ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ========== 星点闪烁 (十字+对角星芒) ==========
    const sparkleCount = 10;
    for (let i = 0; i < sparkleCount; i++) {
      const sx = (Math.sin(timestamp * 0.0007 + i * 2.5) * 0.4 + 0.5) * canvas.width;
      const sy = (Math.cos(timestamp * 0.00055 + i * 2.0) * 0.32 + 0.43) * canvas.height;
      const sparklePhase = (timestamp * 0.0035 + i * 1.7) % (Math.PI * 2);
      const sparkleAlpha = Math.max(0, Math.sin(sparklePhase)) * 0.55;
      if (sparkleAlpha > 0.03) {
        const sparkleGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 22);
        const sparkleHue = side === 'left' ? 200 : 335;
        sparkleGrad.addColorStop(0, `hsla(${sparkleHue}, 85%, 88%, ${sparkleAlpha})`);
        sparkleGrad.addColorStop(0.25, `hsla(${sparkleHue}, 65%, 78%, ${sparkleAlpha * 0.5})`);
        sparkleGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = sparkleGrad;
        ctx.beginPath();
        const crossLen = 18 + Math.sin(timestamp * 0.005 + i) * 4;
        ctx.moveTo(sx - crossLen, sy);
        ctx.lineTo(sx - 2, sy);
        ctx.lineTo(sx, sy - crossLen);
        ctx.lineTo(sx, sy + crossLen);
        ctx.lineTo(sx + 2, sy);
        ctx.lineTo(sx + crossLen, sy);
        ctx.lineTo(sx + 2, sy);
        ctx.lineTo(sx, sy - crossLen);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx, sy, 2.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,252,${sparkleAlpha * 1.3})`;
        ctx.fill();
        // 对角芒线
        const diagLen = crossLen * 0.55;
        ctx.beginPath();
        ctx.moveTo(sx - diagLen, sy - diagLen);
        ctx.lineTo(sx + diagLen, sy + diagLen);
        ctx.moveTo(sx + diagLen, sy - diagLen);
        ctx.lineTo(sx - diagLen, sy + diagLen);
        ctx.strokeStyle = `rgba(255,255,252,${sparkleAlpha * 0.3})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    // ========== 人物周围灵气光晕 ==========
    const glowCX = side === 'left' ? canvas.width * 0.62 : canvas.width * 0.38;
    const glowCY = canvas.height * 0.38;
    const edgeGlow = ctx.createRadialGradient(glowCX, glowCY, canvas.height * 0.04,
      canvas.width * 0.5, canvas.height * 0.43, canvas.height * 0.58);
    const glowColor = side === 'left'
      ? 'rgba(110,195,245,0.06)'
      : 'rgba(245,155,205,0.06)';
    edgeGlow.addColorStop(0, glowColor);
    edgeGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = edgeGlow;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ========== 上升流光柱 (偶尔出现) ==========
    if (Math.sin(timestamp * 0.0004 + (side === 'right' ? 1.5 : 0)) > 0.7) {
      const beamX = side === 'left'
        ? canvas.width * 0.15 + Math.sin(timestamp * 0.0009) * 30
        : canvas.width * 0.85 + Math.cos(timestamp * 0.0009) * 30;
      const beamGrad = ctx.createLinearGradient(0, canvas.height, 0, 0);
      const beamHue = side === 'left' ? 195 : 340;
      beamGrad.addColorStop(0, 'transparent');
      beamGrad.addColorStop(0.5, `hsla(${beamHue}, 70%, 70%, 0.06)`);
      beamGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = beamGrad;
      ctx.fillRect(beamX - 1.5, 0, 3, canvas.height);
    }

    // ========== 环形灵气波 (周期性扩散) ==========
    const ringPhase = (timestamp * 0.00025) % (Math.PI * 2);
    if (Math.sin(ringPhase) > 0.3) {
      const ringAlpha = (Math.sin(ringPhase) - 0.3) * 0.05;
      const ringR = 120 + (timestamp * 0.015) % 250;
      const ringGrad = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.35, ringR * 0.8,
        canvas.width * 0.5, canvas.height * 0.35, ringR
      );
      ringGrad.addColorStop(0, 'transparent');
      ringGrad.addColorStop(0.5, `hsla(${side === 'left' ? 200 : 340}, 65%, 75%, ${ringAlpha})`);
      ringGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = ringGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  function animate(timestamp) {
    time = timestamp;
    drawCharacter(leftCtx, leftCanvas, particlesL, 'left', timestamp);
    drawCharacter(rightCtx, rightCanvas, particlesR, 'right', timestamp);
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
